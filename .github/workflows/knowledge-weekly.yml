name: Build Self-Hosted Knowledge

on:
  workflow_dispatch:
    inputs:
      use_custom_domain:
        description: "Write CNAME from repository variable PAGES_CUSTOM_DOMAIN"
        required: false
        default: "false"
  schedule:
    - cron: "0 3 * * 0"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: knowledge-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run harvester
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/harvest_knowledge.py

      - name: Manage CNAME
        env:
          USE_CUSTOM_DOMAIN: ${{ inputs.use_custom_domain || 'false' }}
          CUSTOM_DOMAIN: ${{ vars.PAGES_CUSTOM_DOMAIN }}
        run: |
          if [ "$USE_CUSTOM_DOMAIN" = "true" ] && [ -n "$CUSTOM_DOMAIN" ]; then
            echo "$CUSTOM_DOMAIN" > site/CNAME
            echo "Using custom domain: $CUSTOM_DOMAIN"
          else
            rm -f site/CNAME
            echo "Custom domain disabled for this run"
          fi

      - name: Commit updated knowledge
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A site data/state
          git commit -m "Weekly knowledge refresh" || echo "No changes"
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
