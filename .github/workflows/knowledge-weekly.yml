name: Build Self-Hosted Knowledge

on:
  workflow_dispatch:
    inputs:
      publish_to_pages:
        description: "Publish generated site to GitHub Pages"
        required: false
        default: "false"
      run_harvester:
        description: "Run data harvester (if false, later phases use files already in repo)"
        required: false
        default: "true"
      use_custom_domain:
        description: "Write CNAME from repository variable PAGES_CUSTOM_DOMAIN (used only if publish_to_pages=true)"
        required: false
        default: "false"
      ingest_to_supabase:
        description: "Ingest generated knowledge into Supabase registry_apps"
        required: false
        default: "true"
      deploy_registry_search_function:
        description: "Deploy Supabase Edge Function registry-search (requires Supabase CLI token+project ref)"
        required: false
        default: "false"
  schedule:
    - cron: "0 3 * * 0"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: knowledge-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run harvester
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.run_harvester == 'true') || (github.event_name != 'workflow_dispatch' && vars.ENABLE_HARVEST != 'false') }}
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/harvest_knowledge.py

      - name: Manage CNAME
        env:
          USE_CUSTOM_DOMAIN: ${{ inputs.use_custom_domain || 'false' }}
          CUSTOM_DOMAIN: ${{ vars.PAGES_CUSTOM_DOMAIN }}
        run: |
          if [ "$USE_CUSTOM_DOMAIN" = "true" ] && [ -n "$CUSTOM_DOMAIN" ]; then
            echo "$CUSTOM_DOMAIN" > site/CNAME
            echo "Using custom domain: $CUSTOM_DOMAIN"
          else
            rm -f site/CNAME
            echo "Custom domain disabled for this run"
          fi

      - name: Commit updated knowledge
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A site data/state
          git commit -m "Weekly knowledge refresh" || echo "No changes"
          git push

      - name: Ingest to Supabase
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.ingest_to_supabase == 'true') || (github.event_name != 'workflow_dispatch' && vars.ENABLE_SUPABASE_INGEST == 'true') }}
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_URL: ${{ format('https://{0}.supabase.co', secrets.SUPABASE_PROJECT_REF) }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_API_URL: ${{ vars.EMBEDDING_API_URL }}
          EMBEDDING_MODEL: ${{ vars.EMBEDDING_MODEL }}
        run: |
          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::error::SUPABASE_PROJECT_REF (secret) is missing."
            exit 1
          fi
          if [ -z "$SUPABASE_SECRET_KEY" ]; then
            echo "::error::SUPABASE_SECRET_KEY (secret) is missing."
            exit 1
          fi
          python -u scripts/ingest_registry_to_supabase.py --manifest site/knowledge/manifest.json

      - name: Setup Supabase CLI
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.deploy_registry_search_function == 'true') || (github.event_name != 'workflow_dispatch' && vars.ENABLE_DEPLOY_REGISTRY_SEARCH_FUNCTION == 'true') }}
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate Supabase deploy configuration
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.deploy_registry_search_function == 'true') || (github.event_name != 'workflow_dispatch' && vars.ENABLE_DEPLOY_REGISTRY_SEARCH_FUNCTION == 'true') }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_API_URL: ${{ vars.EMBEDDING_API_URL }}
          EMBEDDING_MODEL: ${{ vars.EMBEDDING_MODEL }}
        run: |
          missing_required=0

          check_required_secret() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "::error::$name is missing. Configure it in repository Secrets and variables."
              missing_required=1
            fi
          }

          check_optional_setting() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "::warning::$name is missing. Semantic search embedding will be disabled."
            fi
          }

          check_required_secret "SUPABASE_ACCESS_TOKEN (secret)" "$SUPABASE_ACCESS_TOKEN"
          check_required_secret "SUPABASE_PROJECT_REF (secret)" "$SUPABASE_PROJECT_REF"

          check_optional_setting "EMBEDDING_API_KEY (secret)" "$EMBEDDING_API_KEY"
          check_optional_setting "EMBEDDING_API_URL (variable)" "$EMBEDDING_API_URL"
          check_optional_setting "EMBEDDING_MODEL (variable)" "$EMBEDDING_MODEL"

          if [ "$missing_required" -ne 0 ]; then
            echo "::error::One or more required Supabase deploy settings are missing."
            exit 1
          fi

      - name: Deploy Edge Function registry-search
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.deploy_registry_search_function == 'true') || (github.event_name != 'workflow_dispatch' && vars.ENABLE_DEPLOY_REGISTRY_SEARCH_FUNCTION == 'true') }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_API_URL: ${{ vars.EMBEDDING_API_URL }}
          EMBEDDING_MODEL: ${{ vars.EMBEDDING_MODEL }}
        run: |
          supabase functions deploy registry-search --project-ref "$SUPABASE_PROJECT_REF"

      - name: Configure Pages
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.publish_to_pages == 'true') || (github.event_name != 'workflow_dispatch' && vars.ENABLE_PAGES_DEPLOY == 'true') }}
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.publish_to_pages == 'true') || (github.event_name != 'workflow_dispatch' && vars.ENABLE_PAGES_DEPLOY == 'true') }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.publish_to_pages == 'true') || (github.event_name != 'workflow_dispatch' && vars.ENABLE_PAGES_DEPLOY == 'true') }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
